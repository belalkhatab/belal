     <style>
    
    @keyframes typing {
      from {
        width: 0;
      }
      to {
        width: 260px;
      }
    }

    @keyframes blink {
      50% {
        border-color: transparent;
      }
    }
  </style>
  <style>
    .face {
      width: 200px;
      height: 200px;
      background-color: yellow;
      border-radius: 50%;
      position: relative;
      margin: 100px auto;
    }

    .eye {
      width: 30px;
      height: 30px;
      background-color: black;
      border-radius: 50%;
      position: absolute;
      top: 50px;
    }

    .eye.left {
      left: 40px;
    }

    .eye.right {
      right: 40px;
    }

    .mouth {
      width: 100px;
      height: 50px;
      border-bottom: 5px solid black;
      border-radius: 0 0 100px 100px;
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
     
</head>
